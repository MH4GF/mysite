name: ci

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}
  GITHUB_TOKEN: ${{ secrets.MH4GF_PAT }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: MH4GF/shared-config/.github/composite-actions/setup-pnpm@f2796daf3cd57dcc0a63b5093dfd2eb32bbcc4a5 # main
      - run: pnpm build:contentlayer
      - run: pnpm exec next typegen
      - run: pnpm lint

  test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: MH4GF/shared-config/.github/composite-actions/setup-pnpm@f2796daf3cd57dcc0a63b5093dfd2eb32bbcc4a5 # main
      - run: pnpm test:vitest
