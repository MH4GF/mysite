name: ci-e2e

on:
  deployment_status:

env:
  TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
  TURBO_TEAM: ${{ vars.TURBO_TEAM }}

jobs:
  e2e:
    if: github.event.deployment_status.state == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    container:
      image: mcr.microsoft.com/playwright:v1.59.1-noble@sha256:b0ab6f3cb99aa7803adbc14d9027ec1785fc6e433b97e134e0f8fe61683b6b53

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: MH4GF/shared-config/.github/composite-actions/setup-pnpm@main
      # 本番環境（https://mh4gf.dev）でベースラインスクリーンショット取得
      - name: Capture baseline screenshots from production
        run: pnpm test:playwright app/__vrt__ --update-snapshots
        env:
          BASE_URL: https://mh4gf.dev
      # Preview環境と比較
      - name: Compare with preview environment
        run: pnpm test:playwright
        env:
          BASE_URL: ${{ github.event.deployment_status.environment_url }}
      - uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        if: failure()
        with:
          name: test-results
          path: test-results/
