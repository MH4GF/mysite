name: ci

on:
  pull_request:
    branches:
      - main

jobs:
  depcruise:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@eef61447b9ff4aafe5dcd4e0bbf5d482be7e7871 # v4
      - uses: MH4GF/dependency-cruiser-report-action@decb101c48f5e01d7039dfab92d7f1ad5229eada # v2.5.1
        with:
          package-manager: pnpm
